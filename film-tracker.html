<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCOMING // Film Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-bright: #2a2a2a;
    --text: #d4d0c8;
    --text-dim: #6b6760;
    --text-bright: #f0ece0;
    --accent: #c8402a;
    --accent-dim: #7a1e10;
    --accent-glow: rgba(200, 64, 42, 0.15);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border-bright);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .header-left h1 {
    font-family: var(--display);
    font-size: clamp(3rem, 6vw, 5.5rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text-bright);
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-sub {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .header-right {
    text-align: right;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .header-right .window-label {
    color: var(--accent);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 0.25rem;
  }

  /* Genre filter bar */
  .filter-bar {
    padding: 1rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }

  .genre-btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .genre-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text);
  }

  .genre-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Stats bar */
  .stats-bar {
    padding: 0.75rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 2rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .stats-bar span { color: var(--text); }

  /* Month sections */
  .month-section {
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.4s ease both;
  }

  .month-header {
    padding: 1.25rem 2.5rem 0.75rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(4px);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .month-name {
    font-family: var(--display);
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    color: var(--text-bright);
  }

  .month-year {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .month-count {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  /* Film cards */
  .films-list {
    padding: 0;
  }

  .film-card {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
    animation: slideIn 0.3s ease both;
  }

  .film-card:hover {
    background: rgba(255,255,255,0.02);
  }

  .film-card:last-child {
    border-bottom: none;
  }

  .film-date {
    padding: 1.25rem 1rem 1.25rem 2.5rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    border-right: 1px solid var(--border);
    min-width: 90px;
  }

  .film-date .day {
    font-size: 1.4rem;
    font-family: var(--display);
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .film-date .weekday {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  .film-body {
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .film-title {
    font-family: var(--display);
    font-size: 1.35rem;
    letter-spacing: 0.04em;
    color: var(--text-bright);
    line-height: 1.1;
  }

  .film-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .genre-tag {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
  }

  .genre-tag.horror { border-color: var(--accent-dim); color: #e06050; }
  .genre-tag.thriller { border-color: #3a3a1e; color: #b8b060; }
  .genre-tag.mystery { border-color: #1e2a3a; color: #6090b8; }
  .genre-tag.sci-fi { border-color: #1e3a2a; color: #60b880; }
  .genre-tag.action { border-color: #2a2a3a; color: #8090c0; }

  .film-studio {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .film-synopsis {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.55;
    max-width: 680px;
  }

  .film-link-col {
    padding: 1.25rem 2rem 1.25rem 1rem;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
  }

  .film-link {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border-bright);
    padding: 0.3rem 0.6rem;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .film-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Loading / Error states */
  .state-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem;
    gap: 1rem;
  }

  .loading-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .loading-bar {
    width: 200px;
    height: 1px;
    background: var(--border-bright);
    position: relative;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    position: absolute;
    height: 100%;
    width: 60px;
    background: var(--accent);
    animation: scan 1.2s ease-in-out infinite;
  }

  .error-text {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .error-detail {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-align: center;
  }

  /* No results */
  .no-results {
    padding: 3rem 2.5rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Divider line between same-day groups handled by date display */
  .same-day .film-date {
    visibility: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  @keyframes scan {
    0% { left: -60px; }
    100% { left: 200px; }
  }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 1.5rem 1.25rem 1rem; flex-direction: column; align-items: flex-start; }
    .header-right { text-align: left; }
    .filter-bar, .stats-bar { padding: 0.75rem 1.25rem; }
    .month-header { padding: 1rem 1.25rem 0.6rem; }
    .film-card { grid-template-columns: 70px 1fr; }
    .film-date { padding: 1rem 0.75rem 1rem 1.25rem; min-width: 70px; }
    .film-body { padding: 1rem; }
    .film-link-col { display: none; }
    .film-title { font-size: 1.1rem; }
    .film-synopsis { font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>IN<span>//</span>COMING</h1>
    <div class="header-sub">Theatrical Release Tracker &mdash; US</div>
  </div>
  <div class="header-right" id="window-info">
    <span class="window-label">Loading window</span>
    &mdash;
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Genre //</span>
  <button class="genre-btn active" data-genre="all">All</button>
  <button class="genre-btn" data-genre="27">Horror</button>
  <button class="genre-btn" data-genre="53">Thriller</button>
  <button class="genre-btn" data-genre="9648">Mystery</button>
  <button class="genre-btn" data-genre="878">Sci-Fi</button>
  <button class="genre-btn" data-genre="28">Action</button>
</div>

<div class="stats-bar" id="stats-bar">
  <span class="loading-text">Fetching data...</span>
</div>

<main id="main-content">
  <div class="state-container">
    <div class="loading-bar"></div>
    <div class="loading-text">Pulling releases from TMDB</div>
  </div>
</main>

<script>
const API_KEY = '798305bccb176e0e19a68692c23dd2cd';
const BASE_URL = 'https://api.themoviedb.org/3';

const GENRE_IDS = [27, 53, 9648, 878, 28];
const GENRE_NAMES = {
  27: 'Horror',
  53: 'Thriller',
  9648: 'Mystery',
  878: 'Sci-Fi',
  28: 'Action'
};
const GENRE_CSS = {
  27: 'horror',
  53: 'thriller',
  9648: 'mystery',
  878: 'sci-fi',
  28: 'action'
};

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let allFilms = [];
let activeGenre = 'all';

function getDateWindow() {
  const today = new Date();
  const end = new Date(today);
  end.setMonth(end.getMonth() + 6);
  return {
    start: today.toISOString().split('T')[0],
    end: end.toISOString().split('T')[0]
  };
}

async function fetchPage(genreId, dateStart, dateEnd, page) {
  const params = new URLSearchParams({
    api_key: API_KEY,
    with_genres: genreId,
    without_genres: '16,10770',
    'primary_release_date.gte': dateStart,
    'primary_release_date.lte': dateEnd,
    with_original_language: 'en',
    'popularity.gte': '15',
    sort_by: 'popularity.desc',
    page,
    language: 'en-US'
  });
  const url = `${BASE_URL}/discover/movie?${params}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

async function fetchGenre(genreId, dateStart, dateEnd) {
  // Only 2 pages per genre sorted by popularity desc — keeps quality, kills junk
  const first = await fetchPage(genreId, dateStart, dateEnd, 1);
  const totalPages = Math.min(first.total_pages, 2);
  const results = [...first.results];
  if (totalPages > 1) {
    const second = await fetchPage(genreId, dateStart, dateEnd, 2);
    results.push(...second.results);
  }
  return results.map(m => ({ ...m, _matched_genre: genreId }));
}

async function fetchStudios(movieId) {
  try {
    const res = await fetch(`${BASE_URL}/movie/${movieId}?api_key=${API_KEY}&language=en-US`);
    const data = await res.json();
    const studios = data.production_companies || [];
    return studios.slice(0, 2).map(s => s.name).join(' / ') || '';
  } catch { return ''; }
}

async function loadAllFilms() {
  const { start, end } = getDateWindow();

  // Update window info
  const windowInfo = document.getElementById('window-info');
  const startDate = new Date(start + 'T12:00:00');
  const endDate = new Date(end + 'T12:00:00');
  windowInfo.innerHTML = `<span class="window-label">6-Month Window</span>${MONTHS_SHORT[startDate.getMonth()]} ${startDate.getFullYear()} &mdash; ${MONTHS_SHORT[endDate.getMonth()]} ${endDate.getFullYear()}`;

  try {
    // Fetch all genres in parallel
    const genreResults = await Promise.all(
      GENRE_IDS.map(id => fetchGenre(id, start, end))
    );

    // Deduplicate by movie ID, preserving all genre tags
    // Also filter out entries with no synopsis or suspiciously low popularity
    const filmMap = new Map();
    genreResults.forEach((films, idx) => {
      const genreId = GENRE_IDS[idx];
      films.forEach(film => {
        if (!film.release_date) return;
        if (!film.overview || film.overview.trim().length < 20) return; // no synopsis = likely junk
        if (film.popularity < 3) return; // extra safety net
        if (filmMap.has(film.id)) {
          // Add genre to existing entry
          filmMap.get(film.id)._genres.add(genreId);
        } else {
          filmMap.set(film.id, {
            ...film,
            _genres: new Set([genreId]),
            _all_genre_ids: film.genre_ids || []
          });
        }
      });
    });

    // Convert to array, sort by date then title
    allFilms = Array.from(filmMap.values()).sort((a, b) => {
      const dateCompare = a.release_date.localeCompare(b.release_date);
      if (dateCompare !== 0) return dateCompare;
      return a.title.localeCompare(b.title);
    });

    // Fetch studios for first 30 films to avoid rate limits
    const studioPromises = allFilms.slice(0, 30).map(f => fetchStudios(f.id));
    const studios = await Promise.all(studioPromises);
    allFilms.slice(0, 30).forEach((f, i) => { f._studio = studios[i]; });

    renderFilms();

  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="state-container">
        <div class="error-text">// FETCH ERROR</div>
        <div class="error-detail">${err.message}</div>
        <div class="error-detail">Check your API key or network connection.</div>
      </div>`;
    document.getElementById('stats-bar').innerHTML = '<span style="color:var(--accent)">Error loading data</span>';
  }
}

function getFilteredFilms() {
  if (activeGenre === 'all') return allFilms;
  return allFilms.filter(f => f._genres.has(parseInt(activeGenre)));
}

function renderFilms() {
  const films = getFilteredFilms();
  const main = document.getElementById('main-content');
  const statsBar = document.getElementById('stats-bar');

  if (films.length === 0) {
    main.innerHTML = `<div class="no-results">// No releases found for selected genre in this window.</div>`;
    statsBar.innerHTML = `<span>0</span> releases`;
    return;
  }

  statsBar.innerHTML = `<span>${films.length}</span> releases &nbsp;|&nbsp; <span>${countMonths(films)}</span> months`;

  // Group by month
  const byMonth = {};
  films.forEach(f => {
    const d = new Date(f.release_date + 'T12:00:00');
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!byMonth[key]) byMonth[key] = { label: MONTHS[d.getMonth()], year: d.getFullYear(), films: [] };
    byMonth[key].films.push(f);
  });

  let html = '';
  Object.values(byMonth).forEach(month => {
    html += `
      <div class="month-section">
        <div class="month-header">
          <span class="month-name">${month.label}</span>
          <span class="month-year">${month.year}</span>
          <span class="month-count">${month.films.length} release${month.films.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="films-list">
          ${month.films.map((f, i) => renderCard(f, i, month.films)).join('')}
        </div>
      </div>`;
  });

  main.innerHTML = html;
}

function renderCard(film, idx, monthFilms) {
  const d = new Date(film.release_date + 'T12:00:00');
  const day = d.getDate();
  const weekday = DAYS[d.getDay()];

  // Check if same date as previous film
  const prevFilm = idx > 0 ? monthFilms[idx - 1] : null;
  const sameDay = prevFilm && prevFilm.release_date === film.release_date;

  // Genre tags — use _all_genre_ids filtered to our genres
  const relevantGenres = [...film._genres];
  // Also include any matching genre_ids not in _genres set (from TMDB's own tags)
  film._all_genre_ids.forEach(id => {
    if (GENRE_IDS.includes(id)) relevantGenres.push(id);
  });
  const uniqueGenres = [...new Set(relevantGenres)];

  const genreTags = uniqueGenres
    .map(id => `<span class="genre-tag ${GENRE_CSS[id]}">${GENRE_NAMES[id]}</span>`)
    .join('');

  const synopsis = film.overview
    ? (film.overview.length > 220 ? film.overview.slice(0, 217) + '...' : film.overview)
    : '<em>No synopsis available.</em>';

  const studio = film._studio ? `<span class="film-studio">${film._studio}</span>` : '';

  const tmdbUrl = `https://www.themoviedb.org/movie/${film.id}`;

  return `
    <div class="film-card${sameDay ? ' same-day' : ''}">
      <div class="film-date">
        <span class="day">${day}</span>
        <span class="weekday">${weekday}</span>
      </div>
      <div class="film-body">
        <div class="film-title">${film.title}</div>
        <div class="film-meta">
          ${genreTags}
          ${studio}
        </div>
        <div class="film-synopsis">${synopsis}</div>
      </div>
      <div class="film-link-col">
        <a href="${tmdbUrl}" target="_blank" rel="noopener" class="film-link">TMDB →</a>
      </div>
    </div>`;
}

function countMonths(films) {
  const months = new Set(films.map(f => f.release_date.slice(0, 7)));
  return months.size;
}

// Genre filter buttons
document.querySelectorAll('.genre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGenre = btn.dataset.genre;
    renderFilms();
  });
});

// Init
loadAllFilms();
</script>
</body>
</html>
